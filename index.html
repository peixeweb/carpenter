<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <script>
        // Safety check to prevent libraries from trying to overwrite the read-only window.fetch property
        if (typeof window !== 'undefined' && window.fetch) {
            try {
                const originalFetch = window.fetch;
                Object.defineProperty(window, 'fetch', {
                    get: function() { return originalFetch; },
                    set: function() { 
                        console.warn('Attempt to overwrite window.fetch ignored to prevent TypeError.');
                    },
                    configurable: true,
                    enumerable: true
                });
            } catch (e) {}
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpenter - Fine Woodworking</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/d2691e/hammer.png">
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://lh3.googleusercontent.com">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
