<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safety check to prevent libraries from trying to overwrite the read-only window.fetch property
      // This provides a setter that does nothing, avoiding the "only a getter" TypeError.
      if (typeof window !== 'undefined' && window.fetch) {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { 
              console.warn('Attempt to overwrite window.fetch ignored to prevent TypeError.');
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // Ignore errors during redefinition
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
